    <style>
        :root {
            --pink: #E88B9A;
            --green: #5D8F3F;
            --dark: #2C3E2E;
            --white: #FFFFFF;
            --light: #FAFAFA;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--white);
            color: var(--green);
            overflow-x: hidden;
        }

        /* PAGE SHELL: flexbox column so hero fills remaining space */
        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            padding: 28px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .logo-img {
            height: 72px;
            width: auto;
            display: block;
        }

        nav a {
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
        }

        /* HERO: flex: 1 so it fills remaining viewport height */
        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px 60px;
        }

        .hero-content {
            text-align: center;
            max-width: 640px;
        }

        h1 {
            font-family: 'Crimson Pro', serif;
            font-size: clamp(36px, 4.5vw, 54px);
            font-weight: 300;
            line-height: 1.2;
            letter-spacing: -1.5px;
            color: var(--green);
            margin-bottom: 36px;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.2s forwards;
        }

        h1 strong {
            font-weight: 400;
            font-style: italic;
            color: var(--green);
        }

        .cta-group {
            display: flex;
            justify-content: center;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.5s forwards;
        }

        .btn {
            padding: 16px 40px;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.25s ease;
        }

        .btn-primary {
            background: var(--pink);
            color: var(--white);
        }

        .btn-primary:hover {
            background: var(--green);
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(232, 139, 154, 0.35);
        }

        /* FOOTER */
        footer {
            padding: 28px 48px;
            background: var(--light);
            text-align: center;
            flex-shrink: 0;
        }

        footer p {
            font-size: 13px;
            color: var(--green);
            opacity: 0.6;
        }

        /* ANIMATIONS */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            header { padding: 20px 24px; }
            .logo-img { height: 56px; }
            h1 { letter-spacing: -0.5px; }
            footer { padding: 24px; }
        }
    </style>
</head>

<div class="page">

                <span style="color: var(--pink);">Social</span>
            </a>
        </nav>
    </header>

<section class="hero">
    <div class="hero-content">

        <div class="cta-group">
            <a href="https://app.joinguava.co/auth" class="btn btn-primary" onclick="posthog.capture('join_cta_clicked', {location: 'hero'})">Join Guava</a>
        </div>

    or, try something fun —
</p>
